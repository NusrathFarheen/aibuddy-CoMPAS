name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Flutter (FIXED VERSION)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.2'   # ✅ stable known working version
          channel: 'stable'

      # 3. Enable web explicitly (important!)
      - name: Enable Flutter Web
        run: flutter config --enable-web

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          cd mobile_app
          flutter pub get

      # 5. Build web (FIXED FLAGS)
      - name: Build Flutter Web
        run: |
          cd mobile_app
          flutter build web --release --base-href "/aibuddy-CoMPAS/"

      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./mobile_app/build/web
          force_orphan: true
